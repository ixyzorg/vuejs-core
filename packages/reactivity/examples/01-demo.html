<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app"></div>
    <button id="flag">flag</button>
    <button id="age">age</button>
    <button id="name">name</button>
    <script type="module">
      import { ref, effect } from '../dist/reactivity.esm.js'

      const nameRef = ref('mason')
      const ageRef = ref(10)
      const flagRef = ref(true)
      const app = document.getElementById('app')
      const flagBtn = document.getElementById('flag')
      const ageBtn = document.getElementById('age')
      const nameBtn = document.getElementById('name')
      let count = 0
      const e = effect(() => {
        console.count('effect次数===>')
        if (flagRef.value) {
          app.innerHTML = ageRef.value
        } else {
          app.innerHTML = nameRef.value
        }
      })
      flagBtn.onclick = () => {
        flagRef.value = !flagRef.value
        console.dir(e.effect)
      }
      ageBtn.onclick = () => {
        ageRef.value++
      }
      nameBtn.onclick = () => {
        nameRef.value = nameRef.value + Math.random().toFixed(1)
      }
    </script>
  </body>
</html>
