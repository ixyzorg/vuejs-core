<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { h, render, Text, createApp, ref,nextTick } from '../dist/vue.esm.js'
      const Comp1 = {
        setup() {
          const count = ref(0)

          return {
            count
          }
        },
        render() {
          return h(
            'div',
            {
              onClick: () => {
                this.count++
                this.count++
                this.count++
                const el = document.querySelector('#fmd')
                this.$nextTick(() => {
                  console.log(el)
                })
              },
              id: 'fmd'
            },
            this.count,
            this.$attrs.msg
          )
        }
      }

      const Comp2 = {
        setup(props, { attrs }) {
          const count = ref(0)

          return () => {
            return h(
              'div',
              {
                onClick: () => {
                  count.value++
                  count.value++
                  count.value++
                  const el = document.querySelector('#fmd')
                  nextTick(() => {
                    console.log(el)
                  })
                },
                id: 'fmd'
              },
              count.value,
              attrs.msg
            )
          }
        }
      }

      const app = createApp(Comp1, { msg: 'hello' })
      app.mount('#app')
    </script>
  </body>
</html>
