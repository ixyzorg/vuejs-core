<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app"></div>
    <button id="btn">count</button>
    <script type="module">
      import { h, render, Text, createApp, ref } from '../dist/vue.esm.js'
      const Comp = {
        setup() {
          const count = ref(0)
          btn.onclick = () => {
            count.value++
          }
          return {
            count
          }
        },
        render() {
          return h('h1', this.count)
        }
      }
      const app = createApp(Comp, { style: { color: 'pink' } })
      app.mount('#app')
    </script>
  </body>
</html>
