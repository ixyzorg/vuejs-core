<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import {
        h,
        render,
        Text,
        createApp,
        ref,
        nextTick,
        getCurrentInstance,
        onBeforeMount,
        onMounted,
        onBeforeUpdate,
        onUpdated,
        onBeforeUnmount,
        onUnmounted
      } from '../dist/vue.esm.js'

      const Comp = {
        setup() {
          const num = ref(0)

          onBeforeMount(() => {
            console.log('onBeforeMount')
          })
          onMounted(() => {
            console.log('onMounted')
          })

          onBeforeUpdate(() => {
            console.log('onBeforeUpdate')
          })
          onUpdated(() => {
            console.log('onUpdated')
          })

          onBeforeUnmount(() => {
            console.log('onBeforeUnmount')
          })

          onUnmounted(() => {
            console.log('onUnmounted')
          })

          return () =>
            h(
              'div',
              {
                onClick: () => {
                  num.value++
                }
              },
              num.value
            )
        }
      }
      const app = createApp(Comp)
      app.mount('#app')
      setTimeout(() => {
        app.unmount()
      }, 2000)
    </script>
  </body>
</html>
